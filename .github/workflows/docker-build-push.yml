name: Build and Push Docker Image to GHCR

on:
  push:
    branches: [ main ]
    paths:
      - 'cable_maintenance_ai/**'
      - '.github/workflows/docker-build-push.yml'
      - 'requirements.txt'
      - 'Dockerfile'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cable-maintenance-ai

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./cable_maintenance_ai
          file: ./cable_maintenance_ai/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Summary
        run: |
          echo "## 🐳 Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tags: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ✅ Build & Push Completed" >> $GITHUB_STEP_SUMMARY

  test:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: ./cable_maintenance_ai
          file: ./cable_maintenance_ai/Dockerfile
          push: false
          load: true
          tags: cable-maintenance-ai:test

      - name: Test Python Dependencies
        run: |
          docker run --rm cable-maintenance-ai:test python -c '
            import streamlit
            import pandas
            import numpy
            import sqlalchemy
            import pyodbc
            import plotly
            import requests
            import papermill
            import nbformat
            from mistralai.client import Mistral
            print("✅ All critical dependencies imported successfully")
            print("✓ mistralai client imported correctly")
          '

      - name: Test Summary
        run: echo "## ✅ All tests passed successfully" >> $GITHUB_STEP_SUMMARY