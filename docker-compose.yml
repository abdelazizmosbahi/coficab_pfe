version: '3.8'

services:
  cable-ai:
    build:
      context: ./cable_maintenance_ai
      dockerfile: Dockerfile
    
    image: cable-manufacturing-ai:latest
    container_name: cable-manufacturing-ai
    
    # Load environment variables from .env
    env_file:
      - .env
    
    ports:
      - "8501:8501"
    
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_LOGGER_LEVEL: "error"
      STREAMLIT_CLIENT_TOOLBARPOSITION: "hidden"
      STREAMLIT_CLIENT_SHOWSIDEBARINITIALSTATE: "collapsed"
      STREAMLIT_SERVER_ENABLECORS: "false"
      STREAMLIT_SERVER_ENABLEXSRFPROTECTION: "true"

    # ========================================
    # Volumes - Uncomment for Development
    # ========================================
    volumes:
      - ./cable_maintenance_ai:/app

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlalchemy; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - cable-ai-network

networks:
  cable-ai-network:
    driver: bridge